name: ✨ Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: |
        Describe the use case or pain point. Don't propose a solution yet —
        focus on the "why".
      placeholder: "When working with X, I find it tedious to…"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How could ContextWolf address this — CLI command, MCP tool, schema change, …?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you think about?

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Examples from other tools, mockups, related issues, etc.
